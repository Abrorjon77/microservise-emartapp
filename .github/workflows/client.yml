name: Client CI

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/emart-client

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            ./client

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Update config repo with new image tag
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/emart-client
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/Abrorjon77/emart-k8s-config.git
          cd emart-k8s-config

          echo "Updating image to: $IMAGE_NAME:${{ github.sha }}"
          
          sed -i "s|image: $IMAGE_NAME:.*|image: $IMAGE_NAME:${{ github.sha }}|" client/deployment.yaml

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add client/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update client image to ${{ github.sha }}"
          git push