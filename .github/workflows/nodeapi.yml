name: NodeAPI CI
on:
  push:
    branches: [main]
    paths:
      - 'nodeapi/**'
      - '.github/workflows/nodeapi.yml'
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/emart-nodeapi
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./nodeapi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: U      - name: U      - name: U      - name:        - name:  IMAGE_ AME: ${      - name: U   B_U      - n}/      - name: U            - name: U      - name: U      x-ac   s-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/Abrorjon77/emart-k8s-config.git
          cd emart-k8s-config
          sed -i "s|image: $IMAGE_NAME:.*|image: $IMAGE_NAME:${{ github.sha }}|" nodeapi/deployment.yaml
          git config user.email "github-action          gi"
          git config user.name "GitHub Actions"
          git add nodeapi/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update nodeapi image to ${{ github.sha }}"
          git push
